server {
    listen 80;
    
    # Định nghĩa thư mục root cho Nginx phục vụ file tĩnh
    root /usr/share/nginx/html;
    index index.html;

    # Cấu hình proxy cho các API requests gọi đến Backend server
    location /api {
        # 'backend' là tên service, port 5001
        proxy_pass http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cấu hình cho React Router (Single Page Application)
    # Khi truy cập các route như /about, /login, ... Nginx sẽ trả về index.html
    # và để React Router xử lý tiếp.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
